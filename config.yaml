# RetailPulse Configuration - Production Settings
# Version: 2.0 - Industry Edition

# Project Metadata
project:
  name: "RetailPulse"
  version: "2.0"
  author: "Zidio Development"
  date: "March 2026"
  description: "AI-Powered Customer Analytics & Demand Forecasting Platform"

# Data Configuration
data:
  input_path: "data/cleaned_retail_data.csv"
  output_path: "outputs/"
  cache_path: "cache/"
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  encoding: "utf-8"

# Business Targets
targets:
  demand_forecast_mape: 0.12  # ≤ 12% MAPE
  churn_auc_roc: 0.88  # AUC-ROC ≥ 0.88
  churn_precision_top20: 0.75  # Precision @ top 20% ≥ 0.75
  processing_time_minutes: 5  # < 5 minutes batch jobs
  monthly_transactions: 10000000  # 10M+ transactions per month

# Customer Segmentation
segmentation:
  method: "k-means"  # k-means or dbscan
  n_clusters: 6
  rfm_quantiles: [0.25, 0.5, 0.75]
  recency_days: 365
  frequency_threshold: 5
  monetary_threshold: 100

# Demand Forecasting
forecasting:
  horizons: [7, 30, 90]  # Days ahead
  train_test_split: 0.8
  prophet:
    seasonality_mode: "multiplicative"
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
  lstm:
    sequence_length: 30
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    learning_rate: 0.001
    epochs: 100
    batch_size: 32

# Churn Prediction
churn:
  lookback_days: 90
  target_days: 30
  model_type: "xgboost"
  xgboost:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 100
    subsample: 0.8
    colsample_bytree: 0.8
  probability_threshold: 0.5

# Inventory Optimization
inventory:
  method: "forecast_based"  # forecast_based or abc_analysis
  safety_stock_factor: 1.5
  reorder_point_percentile: 25
  lead_time_days: 3
  service_level: 0.95
  min_stock_threshold: 1

# MLflow Configuration
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "RetailPulse-Production"
  registry_uri: "./model_registry"
  log_models: true
  log_artifacts: true
  log_datasets: true

# Drift Detection (Evidently AI)
drift_detection:
  enabled: true
  reference_period_days: 30
  target_column: "TotalPrice"
  feature_columns:
    - "Quantity"
    - "UnitPrice"
    - "RFMScore"
  drift_threshold: 0.05  # 5% threshold

# Feature Engineering
features:
  temporal:
    - "year"
    - "month"
    - "day_of_week"
    - "hour"
    - "is_weekend"
    - "is_holiday"
  aggregation_windows:
    - 7  # 7-day rolling statistics
    - 30  # 30-day rolling statistics
    - 90  # 90-day rolling statistics
  lag_features: [1, 7, 14, 30]

# Monitoring & Alerts
monitoring:
  enabled: true
  prometheus_enabled: false
  alert_email: "alerts@zidio.dev"
  thresholds:
    model_accuracy_drop: 0.05
    forecast_mape_threshold: 0.15
    data_quality_score: 0.90

# Production Deployment
deployment:
  environment: "production"
  replicas: 3
  cpu_limit: "2000m"
  memory_limit: "4Gi"
  port: 8501  # Streamlit default
  debug: false
  log_level: "INFO"

# API Configuration
api:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 30
  rate_limit: 1000

# Cache Configuration
cache:
  enabled: true
  ttl_hours: 24
  backend: "file"  # file or redis
  redis_host: "localhost"
  redis_port: 6379

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "logs/retailpulse.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5
